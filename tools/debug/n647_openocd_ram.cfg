# NECCS N647 RAM debug configuration for STMicroelectronics OpenOCD.
# Use with CubeIDE's ST OpenOCD package and st_scripts search path.

if { ![info exists GDB_PORT] } {
	set GDB_PORT 3333
}

if { ![info exists TELNET_PORT] } {
	set TELNET_PORT 4444
}

if { ![info exists TCL_PORT] } {
	set TCL_PORT 6666
}

if { ![info exists CLOCK_FREQ] } {
	set CLOCK_FREQ 4000
}

if { ![info exists CONNECT_UNDER_RESET] } {
	set CONNECT_UNDER_RESET 0
}

gdb_port $GDB_PORT
telnet_port $TELNET_PORT
tcl_port $TCL_PORT

source [find interface/stlink-dap.cfg]

set WORKAREASIZE 0x8000
transport select "dapdirect_swd"

set CHIPNAME STM32N647X0HxQ
set BOARDNAME NECCS_N647_RAM_DEBUG

set ENABLE_LOW_POWER 1
set STOP_WATCHDOG 1

# Normal RAM debug uses attach/halt. Recovery mode can request connect under
# reset from start_n647_openocd.ps1 -ConnectUnderReset.
if { $CONNECT_UNDER_RESET == 1 } {
	reset_config srst_only srst_nogate connect_assert_srst
} else {
	reset_config none
}
set CORE_RESET 0

# Cortex-M55 core AP on STM32N6.
set AP_NUM 1

# RAM debug must not initialize external Flash loaders.
if { [info exists INDEX_INITIALIZED_LOADER] } {
	unset INDEX_INITIALIZED_LOADER
}
if { [info exists FLASH_LOADERS] } {
	unset FLASH_LOADERS
}

source [find target/stm32n6x.cfg]
